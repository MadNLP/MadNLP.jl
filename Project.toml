[compat]
HSL = "0.5.4"
LinearAlgebra = "1.10"
Logging = "1.10"
MINLPTests = "~0.5"
MadCore = "0.1"
MadCoreHSL = "0.1"
MadCoreLDLFactorizations = "0.1"
MadCoreMUMPS = "0.1"
MadCorePardiso = "0.1"
MadCoreSuiteSparse = "0.1"
MadNLPCore = "0.11"
MadNLPHybridKKT = "0.4"
MadNLPTests = "0.6"
MathOptInterface = "1.48"
NLPModels = "0.21.9"
Pkg = "1.10"
PrecompileTools = "1.2"
Printf = "1.10"
Reexport = "1"
SolverCore = "~0.3"
SparseArrays = "1.10"
julia = "1.10"

[extras]
HSL = "34c5aeac-e683-54a6-a0e9-6e0fdc586c50"
MINLPTests = "ee0a3090-8ee9-5cdb-b8cb-8eeba3165522"
MadNLPTests = "b52a2a03-04ab-4a5f-9698-6a2deff93217"
Quadmath = "be4d8f0f-7fa4-5f49-b795-2f01399ab2dd"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test", "MadNLPTests", "MINLPTests", "Random", "MathOptInterface", "Quadmath", "HSL"]

# Dev-time monorepo workspace (Julia >= 1.12): MadNLP, the MadCore workspace, and
# the lib/* subpackages share a single Manifest. Stripped for the registered
# package, so the 1.10 runtime compat floor is unaffected.
# cuMadNLP (CUDA-hard) is intentionally NOT in the workspace: a workspace-wide
# instantiate would try to build CUDA, which fails on macOS / GPU-less CI runners.
[workspace]
projects = [
    "MadCore",
    "lib/MadNLPCore",
    "lib/MadNLPHybridKKT",
    "lib/MadNLPTests",
]
