name = "MadCore"
uuid = "6fc510d6-e066-472d-adc5-2ce5e9b14820"
version = "0.1.0"
authors = ["MadNLP contributors"]

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
Logging = "56ddb016-857b-54e1-b83d-db4d58db5568"
NLPModels = "a4795742-8479-5a88-8948-cc11e1c8c1a6"
OpenBLAS32_jll = "656ef2d0-ae68-5445-9ca0-591084a874a2"
Pkg = "44cfe95a-1eb2-52ea-b672-e2afdf69b78f"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
SolverCore = "ff4d7338-4cf1-434d-91df-b86cb86fb843"
SparseArrays = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"

[compat]
SparseArrays = "1.10"
Printf = "1.10"
Pkg = "1.10"
Logging = "1.10"
LinearAlgebra = "1.10"
NLPModels = "0.21.9"
OpenBLAS32_jll = "0.3"
PrecompileTools = "1.2"
SolverCore = "~0.3"
julia = "1.10"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test"]

# Dev-time monorepo workspace (Julia >= 1.12): MadCore + its backend subpackages
# share a single Manifest. Stripped for the registered package, so the 1.10
# runtime compat floor is unaffected.
# GPU-hard members (MadCoreCUDA, MadCoreAMDGPU) are intentionally NOT in the
# workspace: a workspace-wide instantiate would try to build CUDA/AMDGPU, which
# fail on macOS / GPU-less CI runners. Develop those alongside as needed.
[workspace]
projects = [
    "lib/MadCoreLDLFactorizations",
    "lib/MadCoreSuiteSparse",
    "lib/MadCoreMUMPS",
    "lib/MadCoreHSL",
    "lib/MadCorePardiso",
    "lib/MadCoreKernelAbstractions",
    "lib/MadCoreGPUArrays",
    "lib/MadCoreOneAPI",
]
