name: build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  actions: write
  contents: read

jobs:
  test-madnlp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['1']
        julia-arch: [x64]
        os: [ubuntu-latest,macos-latest,windows-latest]
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/install-juliaup@v2
        with:
          channel: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v1
      - name: test MadNLP
        shell: julia --project=. --color=yes {0}
        run: |
          using Pkg
          Pkg.Registry.update()
          Pkg.instantiate()
          using MadNLP
          PATH_MADNLP = dirname(pathof(MadNLP))
          Pkg.develop(path=joinpath(PATH_MADNLP, "..", "lib", "MadNLPTests"))
          Pkg.test("MadNLP", coverage=true)
      - uses: julia-actions/julia-processcoverage@v1
        with:
          # The IPM moved to lib/MadNLPCore/src and the solver-agnostic core to
          # MadCore/src; collect coverage from all three so codecov sees the code
          # the MadNLP suite exercises (was all under src/ before the refactor).
          directories: src,MadCore/src,lib/MadNLPCore/src
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  test-hsl:
    runs-on:
      labels: hsl
    strategy:
      matrix:
        julia-version: ['1']
        hsl-version: ['2024.11.28', '2025.7.21']
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/install-juliaup@v2
        with:
          channel: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v1
      - name: Set HSL_VERSION as environment variable
        run: echo "HSL_VERSION=${{ matrix.hsl-version }}" >> $GITHUB_ENV
      - name: test MadCoreHSL
        shell: julia --project=./MadCore/lib/MadCoreHSL --color=yes {0}
        run: |
          using Pkg
          Pkg.Registry.update()
          path_HSL_jll = "/home/action-runner/HSL_jll.jl.v" * ENV["HSL_VERSION"]
          Pkg.develop([
              PackageSpec(path=path_HSL_jll),
          ])
          Pkg.test("MadCoreHSL", coverage=true)
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: MadCore/lib/MadCoreHSL/src
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  # Pardiso license currently not available
  #
  # test-pardiso:
  #   runs-on:
  #     labels: pardiso
  #   strategy:
  #     matrix:
  #       julia-version: ['1']
  #   steps:
  #     - uses: actions/checkout@v2
  #     - uses: julia-actions/install-juliaup@v2
  #       with:
  #         channel: ${{ matrix.julia-version }}
  #     - uses: julia-actions/cache@v1
  #     - name: test MadNLPPardiso
  #       shell: julia --project=./lib/MadNLPPardiso --color=yes {0}
  #       run: |
  #         using Pkg
  #         Pkg.Registry.update()
  #         Pkg.test("MadNLPPardiso", coverage=true)
  #     - uses: julia-actions/julia-processcoverage@v1
  #       with:
  #         directories: lib/MadNLPPardiso/src
  #     - uses: codecov/codecov-action@v5
  #       with:
  #         file: lcov.info
  # need to run one on cuda and one on amdgpu
  test-gpu:
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1']
        gpu: [cuda13, amdgpu]
    runs-on:
      - self-hosted
      - ${{ matrix.gpu }}
    continue-on-error: ${{ matrix.gpu == 'amdgpu' }}
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/install-juliaup@v2
        with:
          channel: ${{ matrix.julia-version }}
      # --- CUDA leg: cuMadNLP (built on the shared MadNLPGPU base) ---
      - name: Setup test environment (CUDA)
        if: matrix.gpu == 'cuda13'
        shell: julia --project=./cuMadNLP/test --color=yes {0}
        run: |
          using Pkg
          Pkg.Registry.update()
          Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="./MadCore"),
              PackageSpec(path="./MadCore/lib/MadCoreKernelAbstractions"),
              PackageSpec(path="./MadCore/lib/MadCoreCUDA"),
              PackageSpec(path="./MadCore/lib/MadCoreCUDSS"),
              PackageSpec(path="./MadNLPGPU"),
              PackageSpec(path="./cuMadNLP"),
              PackageSpec(path="./lib/MadNLPTests"),
          ])
      - name: Add CUDA and CUDSS
        if: matrix.gpu == 'cuda13'
        shell: julia --project=./cuMadNLP/test --color=yes {0}
        run: |
          using Pkg
          Pkg.add("CUDA")
          Pkg.add("CUDSS")
      - name: test cuMadNLP
        if: matrix.gpu == 'cuda13'
        env:
          MADNLP_GPU_BACKEND: ${{ matrix.gpu }}
        run: julia --project=./cuMadNLP/test --code-coverage=user --color=yes -e 'include("cuMadNLP/test/runtests.jl")'
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.gpu == 'cuda13'
        with:
          directories: MadCore/lib/MadCoreCUDA/src,MadCore/lib/MadCoreCUDSS/src,MadNLPGPU/src,cuMadNLP/src
      # --- ROCm leg: rocMadNLP (built on the shared MadNLPGPU base) ---
      - name: Setup test environment (ROCm)
        if: matrix.gpu == 'amdgpu'
        shell: julia --project=./rocMadNLP/test --color=yes {0}
        run: |
          using Pkg
          Pkg.Registry.update()
          Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="./MadCore"),
              PackageSpec(path="./MadCore/lib/MadCoreKernelAbstractions"),
              PackageSpec(path="./MadCore/lib/MadCoreAMDGPU"),
              PackageSpec(path="./MadNLPGPU"),
              PackageSpec(path="./rocMadNLP"),
              PackageSpec(path="./lib/MadNLPTests"),
          ])
      - name: Add AMDGPU
        if: matrix.gpu == 'amdgpu'
        shell: julia --project=./rocMadNLP/test --color=yes {0}
        run: |
          using Pkg
          Pkg.add("AMDGPU")
      - name: test rocMadNLP
        if: matrix.gpu == 'amdgpu'
        env:
          MADNLP_GPU_BACKEND: ${{ matrix.gpu }}
        run: julia --project=./rocMadNLP/test --code-coverage=user --color=yes -e 'include("rocMadNLP/test/runtests.jl")'
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.gpu == 'amdgpu'
        with:
          directories: MadCore/lib/MadCoreAMDGPU/src,MadNLPGPU/src,rocMadNLP/src
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

